# =============================================================
# config.demo.yaml — 24h PAPER REALISTA
# Banca $200, ZERO fakefill, todos filtros live ligados.
# =============================================================
# Diferenças vs config.yaml (paper observação) e config.live.yaml:
#   • mode: "paper" + paper_perfect_mirror: false → fill via book REAL
#   • Banca $200 (laboratório de risco)
#   • Filtros live aplicados igualmente — slippage/spread/depth
#   • Reportagem completa via demo_journal SQLite + dashboard
#
# Como ativar:
#   cp config.demo.yaml config.yaml
#   sudo systemctl restart polytrader
# =============================================================

scanner:
  enabled: true
  scan_interval_minutes: 60
  leaderboard_periods: ["7d", "30d"]
  min_profit_usd: 500
  min_win_rate: 0.55
  min_trades: 10
  max_wallets_tracked: 5

  scoring_weights:
    pnl: 0.25
    win_rate: 0.20
    consistency: 0.15
    recency: 0.15
    market_diversity: 0.10
    short_term_ratio: 0.15

  wash_trading_filter:
    enabled: true
    min_volume_to_pnl_ratio: 0.05
    exclude_hyperactive: true

  min_short_term_trade_ratio: 0.50
  short_term_threshold_hours: 48
  manual_whitelist: []

tracker:
  enabled: true
  poll_interval_seconds: 5
  use_websocket: true
  signal_max_age_seconds: 300
  min_trade_size_usd: 10           # demo: filtra micro-trades

  market_duration_filter:
    enabled: true
    max_hours_to_resolution: 48
    min_hours_to_resolution: 0.1
    prefer_range_hours: [1, 24]
    hard_block_days: 3
    check_end_date_field: "end_date_iso"
    check_expiration_field: "expiration"
    fallback_behavior: "skip"

executor:
  enabled: true
  # ⚠️ DEMO REALISTA — paper mas com book real, todos filtros, sem fakefill
  mode: "paper"

  # Banca $200 — laboratório
  max_portfolio_usd: 200
  max_position_usd: 5              # max $5 por fill (granular)
  max_positions: 8                 # cap de exposição

  # Sizing whale_proportional (~mesma % que a baleia)
  sizing_mode: "whale_proportional"
  fixed_size_usd: 3
  proportional_factor: 0.05
  whale_sizing_factor: 1.0

  # ⚠️ CRÍTICO: false = simulação realista com book do CLOB.
  # NUNCA mude pra true em demo de avaliação — invalida tudo.
  paper_perfect_mirror: false

  # Cap por mercado
  max_position_pct_of_bank: 0.05   # max 5% da banca por mercado
  profit_safe_pct: 0.50            # 50% de wins → cofre
  min_active_bank_pct: 0.90        # halt se ativa < 90%

  # Realismo paper — 1% fee + 1% slippage adicional na simulação.
  # COMBINA com a slippage real do book (não substitui).
  paper_apply_fees: 0.01
  paper_simulate_slippage: 0.01

  max_daily_loss_usd: 20           # halt em -10% da banca
  max_drawdown_pct: 0.15
  min_price: 0.10                  # entradas só entre 10c-90c
  max_price: 0.90
  avoid_resolved_markets: true

  # Filtros HFT live aplicados igual à produção
  whale_max_slippage_pct: 0.03     # 3% max slippage vs whale
  max_spread: 0.02                 # 2c max spread

  default_order_type: "GTC"
  limit_price_offset: 0.02
  fok_fallback: true
  fok_fallback_timeout_seconds: 30

  max_position_age_hours: 48.0     # stale cleanup forçado em 48h
  max_tag_exposure_pct: 0.30

  copy_buys: true
  copy_sells: true
  min_confidence_score: 0.6
  enforce_market_duration: true
  skip_reason_on_long_market: "BLOCKED: market resolves in {days}d, max allowed is {max}h"

  max_concurrent_signals: 4
  optimistic_execution: false      # paper: REST defensivo
  background_max_concurrent: 5

# === Arbitrage (Track A) — DESABILITADO no demo de copy ===
arbitrage:
  enabled: false
  mode: "paper"
  max_capital_usd: 50
  max_per_op_usd: 10
  min_edge_pct: 0.005
  fee_per_leg: 0.0
  safety_buffer_pct: 0.003
  min_book_depth_usd: 20
  max_hours_to_resolution: 72
  min_minutes_to_resolution: 10
  scan_interval_seconds: 30
  enable_multi_outcome: false
  auto_merge: true
  max_concurrent_ops: 3
  same_market_cooldown_seconds: 60

# === Depth Sizing — LIGADO em demo ===
depth_sizing:
  enabled: true
  max_impact_pct: 0.02
  max_levels: 5

dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  refresh_interval_seconds: 10     # demo refresh rápido
  require_auth: true

notifier:
  enabled: true
  notify_on_trade: true
  notify_on_new_wallet: true
  notify_on_risk_alert: true
  notify_on_daily_summary: true
  daily_summary_hour: 22
